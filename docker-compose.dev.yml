services:
  app:
    image: node:lts
    container_name: dfscrimplanner_app
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
    extra_hosts:
      - "host.docker.internal:host-gateway"  # allows app to reach Supabase on host ports
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dfscrimplanner.rule=Host(`dfscrimplanner.local.com`)"
      - "traefik.http.routers.dfscrimplanner.tls=true"
      - "traefik.http.services.dfscrimplanner.loadbalancer.server.port=5173"
    networks:
      - reverse-proxy

  supabase-cli:
    build:
      context: .
      dockerfile: docker/supabase-cli/Dockerfile
    container_name: dfscrimplanner_supabase_cli
    working_dir: /app
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # CLI talks to host Docker daemon
      - .:/app
    network_mode: host  # supabase containers bind to host ports (54321, 54323, etc.)

networks:
  reverse-proxy:
    external: true
